# SignalOps — Docker Compose Full Stack
# Usage: docker compose up --build
# All services start in dependency order. Postgres health check gates dependent services.


services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: signalops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalops}
      POSTGRES_DB: ${POSTGRES_DB:-signalops}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalops} -d ${POSTGRES_DB:-signalops}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - signalops-net

  # ─── Traceability Store (FastAPI + SQLAlchemy) ─────────────────────────────
  traceability-store:
    build:
      context: ./packages/traceability-store
      dockerfile: Dockerfile
    container_name: signalops-traceability-store
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://signalops:signalops@postgres:5432/signalops}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      API_PORT: 8002
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - signalops-net

  # ─── MCP Wrapper (MCP Server for SerpApi) ─────────────────────────────────
  mcp-wrapper:
    build:
      context: ./packages/mcp-wrapper
      dockerfile: Dockerfile
    container_name: signalops-mcp-wrapper
    restart: unless-stopped
    environment:
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      SERPAPI_BASE_URL: ${SERPAPI_BASE_URL:-https://serpapi.com/search}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-900}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
      RATE_LIMIT_PER_DAY: ${RATE_LIMIT_PER_DAY:-1000}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-sse}
      MCP_SSE_PORT: 8001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - signalops-net

  # ─── Agent Orchestrator (LangChain + FastAPI) ─────────────────────────────
  agent-orchestrator:
    build:
      context: ./packages/agent-orchestrator
      dockerfile: Dockerfile
    container_name: signalops-agent-orchestrator
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MCP_WRAPPER_URL: http://mcp-wrapper:8001
      TRACEABILITY_STORE_URL: http://traceability-store:8002
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      mcp-wrapper:
        condition: service_healthy
      traceability-store:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - signalops-net

  # ─── Web App (React + Vite) ────────────────────────────────────────────────
  web-app:
    build:
      context: ./packages/web-app
      dockerfile: Dockerfile
    container_name: signalops-web-app
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      agent-orchestrator:
        condition: service_healthy
    networks:
      - signalops-net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    name: signalops-pgdata

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  signalops-net:
    name: signalops-net
    driver: bridge
