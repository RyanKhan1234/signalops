server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver; resolve upstreams at request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Proxy /history/ requests to the traceability-store service
    location /history/ {
        set $traceability http://traceability-store:8002;
        rewrite ^/history/(.*) /$1 break;
        proxy_pass $traceability;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy /api/ requests to the agent-orchestrator service
    location /api/ {
        set $orchestrator http://agent-orchestrator:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $orchestrator;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Serve static assets with long cache TTL
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: all unmatched routes serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
